<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Francis le Tracteur — Chicken Snake</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka+One&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
:root{
  --bg1:#0d0520; --bg2:#1a0840;
  --gold:#FFD700; --purple:#c084fc; --purple-d:#6d28d9;
  --green:#16a34a; --green-l:#a3e635;
  --orange:#d97706; --orange-l:#fcd34d;
  --cyan:#0ea5e9;
  --txt:#fff; --muted:#c9aaee;
}
html,body{height:100%}
body{
  background:linear-gradient(160deg,var(--bg1),var(--bg2));
  background-attachment:fixed;
  font-family:'Fredoka One',cursive;
  color:var(--txt);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  overflow-x:hidden;
}
body::before{
  content:''; position:fixed; top:-120px; left:50%; transform:translateX(-50%);
  width:380px; height:380px; border-radius:50%;
  background:radial-gradient(circle,rgba(120,40,200,0.35),transparent 70%);
  pointer-events:none; z-index:0;
}
.app{width:100%; max-width:420px; position:relative; z-index:1; display:flex; flex-direction:column; align-items:center}

/* HEADER */
.brand{display:flex; flex-direction:column; align-items:center; margin-bottom:14px; margin-top:4px}
.brand img{width:110px; height:110px; object-fit:contain; filter:drop-shadow(0 6px 18px rgba(0,0,0,0.6)); animation:bob 3.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-7px) rotate(1deg)}}
.brand h1{
  font-family:'Bangers',cursive; font-size:34px; letter-spacing:3px;
  color:var(--gold); text-shadow:0 0 22px rgba(255,215,0,0.55),0 3px 0 rgba(0,0,0,0.35);
  margin-top:4px; line-height:1; text-align:center;
}
.brand .tagline{font-size:11px; color:var(--muted); letter-spacing:1px; margin-top:3px}

/* CARD */
.card{
  width:100%;
  background:linear-gradient(145deg,rgba(13,5,32,0.95),rgba(30,10,65,0.95));
  border:2px solid rgba(180,100,255,0.30);
  border-radius:24px; padding:22px 18px;
  box-shadow:0 0 50px rgba(120,40,200,0.35);
}

/* PLAYING FULLSCREEN */
body.playing{padding:0; justify-content:flex-start}
body.playing .brand{display:none}
body.playing .app{max-width:480px}
body.playing #screenGame.card{
  border:none; border-radius:0; box-shadow:none; background:transparent;
  padding:10px 10px calc(14px + env(safe-area-inset-bottom));
  min-height:100vh; display:flex; flex-direction:column;
}

/* MENU BUTTONS */
.menu-btn{
  width:100%; padding:18px 18px; border:none; border-radius:16px;
  font-family:'Bangers',cursive; font-size:22px; letter-spacing:2px;
  color:#fff; cursor:pointer; margin-bottom:14px;
  display:flex; align-items:center; justify-content:center; gap:12px;
  touch-action:manipulation; transition:transform .12s,box-shadow .12s,opacity .12s;
  position:relative; overflow:hidden;
}
.menu-btn:active{transform:scale(0.97)}
.menu-btn .ico{font-size:24px; line-height:1}
.menu-btn .lock{position:absolute; right:14px; display:flex; align-items:center; justify-content:center}
.menu-btn .lock svg{width:22px; height:22px; display:block}
#btnWallet{padding-right:44px; padding-top:12px; padding-bottom:12px; font-size:18px}
.wallet-text{display:flex; flex-direction:column; align-items:center; line-height:1.1}
.wallet-sub{font-family:'Fredoka One',cursive; font-size:10px; letter-spacing:0.5px; margin-top:3px; opacity:.95}
.wallet-sub.ok{color:#bbf7d0}
.wallet-sub.warn{color:#fde68a}

.btn-comp-green{background:linear-gradient(135deg,#16a34a,#15803d); box-shadow:0 5px 22px rgba(22,163,74,0.45)}
.btn-comp-orange{background:linear-gradient(135deg,#d97706,#b45309); box-shadow:0 5px 22px rgba(217,119,6,0.40)}
.btn-unique{background:linear-gradient(135deg,#16a34a,#15803d); box-shadow:0 5px 22px rgba(22,163,74,0.45)}
.btn-wallet{background:linear-gradient(135deg,#0ea5e9,#0284c7); box-shadow:0 5px 22px rgba(14,165,233,0.45)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#5b21b6); box-shadow:0 5px 22px rgba(124,58,237,0.45)}

/* STATUS BAR */
.status-bar{border-radius:14px; padding:12px 14px; margin-bottom:16px; font-size:12px; line-height:1.6; font-family:'Fredoka One',cursive}
.status-bar.franc{background:rgba(22,163,74,0.15); border:1.5px solid rgba(163,230,53,0.5); color:#86efac}
.status-bar.no-franc{background:rgba(217,119,6,0.10); border:1.5px solid rgba(217,119,6,0.4); color:var(--orange-l)}
.status-bar b{color:var(--gold)}

/* LANGUAGE FLAGS */
.lang-row{display:flex; justify-content:center; gap:14px; margin-top:6px}
.flag-btn{
  width:66px; height:46px; border-radius:12px; cursor:pointer;
  border:2px solid rgba(168,85,247,0.4); background:rgba(255,255,255,0.05);
  display:flex; align-items:center; justify-content:center;
  touch-action:manipulation; transition:transform .12s,border-color .12s; overflow:hidden;
}
.flag-btn:active{transform:scale(0.92)}
.flag-btn.active{border-color:var(--gold); box-shadow:0 0 18px rgba(255,215,0,0.45)}
.flag-btn svg{width:48px; height:32px; border-radius:4px; display:block}

/* BACK BUTTON */
.back-btn{
  display:flex; align-items:center; gap:6px; width:100%;
  background:rgba(109,40,217,0.2); border:1px solid rgba(168,85,247,0.4);
  color:#a78bfa; font-size:14px; font-family:'Fredoka One',cursive;
  cursor:pointer; margin-bottom:16px; padding:9px 14px; border-radius:10px;
  touch-action:manipulation; transition:opacity .12s,transform .12s;
}
.back-btn:active{opacity:.7; transform:scale(0.98)}
.back-btn::before{content:'←'; font-size:18px; font-weight:bold}

/* SECTION TITLE */
.sec-title{font-family:'Bangers',cursive; font-size:24px; letter-spacing:2px; color:var(--purple); text-align:center; margin-bottom:14px}
.sec-sub{font-size:11px; color:var(--muted); text-align:center; margin-top:-8px; margin-bottom:16px; line-height:1.5}

/* SCORES */
.scores-box{margin-top:6px; background:rgba(255,255,255,0.04); border:1px solid rgba(168,85,247,0.25); border-radius:14px; padding:14px}
.scores-box .sh{font-family:'Bangers',cursive; letter-spacing:1px; color:var(--gold); font-size:16px; margin-bottom:10px; text-align:center}
.score-row{display:flex; align-items:center; justify-content:space-between; padding:8px 10px; border-radius:10px; margin-bottom:6px; font-size:13px; background:rgba(255,255,255,0.03)}
.score-row .val{font-family:'Bangers',cursive; letter-spacing:1px; color:var(--green-l); font-size:16px}
.score-row .meta{font-size:10px; color:var(--muted)}
.total-box{margin-top:12px; text-align:center; font-size:13px; color:var(--muted)}
.total-box b{font-family:'Bangers',cursive; font-size:24px; color:var(--gold); letter-spacing:1px; display:block; margin-top:4px}

/* LEVEL LIST */
.lvl-btn{
  width:100%; padding:15px 16px; border:none; border-radius:14px; margin-bottom:10px;
  font-family:'Bangers',cursive; font-size:18px; letter-spacing:1.5px; color:#fff;
  cursor:pointer; display:flex; align-items:center; justify-content:space-between;
  touch-action:manipulation; transition:transform .1s; position:relative;
}
.lvl-btn:active{transform:scale(0.97)}
.lvl-btn .ll{display:flex; align-items:center; gap:10px; text-align:left}
.lvl-btn .lvl-info{display:flex; flex-direction:column; gap:2px}
.lvl-btn .lvl-name{font-size:17px; line-height:1}
.lvl-btn .lvl-best{font-family:'Fredoka One',cursive; font-size:10px; letter-spacing:0; color:rgba(255,255,255,0.75)}
.lvl-btn .stars{font-size:12px; letter-spacing:1px}
.lvl-btn.unlocked{background:linear-gradient(135deg,#16a34a,#15803d); box-shadow:0 4px 18px rgba(22,163,74,0.4)}
.lvl-btn.lockedb{background:linear-gradient(135deg,#d97706,#b45309); box-shadow:0 4px 18px rgba(217,119,6,0.35)}
.lvl-btn .lk{font-size:18px; display:flex}
.lvl-btn .lk svg{width:20px;height:20px;display:block}
.world-sep{font-family:'Bangers',cursive; font-size:13px; letter-spacing:1px; color:var(--purple); margin:14px 0 8px; text-align:left; opacity:.85}
.world-sep:first-child{margin-top:0}

/* GAME SCREEN */
.game-top{display:flex; align-items:center; justify-content:space-between; width:100%; margin-bottom:8px; gap:8px}
.game-top .lvl-badge{font-family:'Bangers',cursive; letter-spacing:1px; font-size:15px; color:var(--gold); flex:1; text-align:center}
.hud{display:flex; gap:8px; flex-wrap:wrap; justify-content:center; width:100%; margin-bottom:10px}
.hud .chip{
  background:rgba(255,255,255,0.06); border:1px solid rgba(168,85,247,0.3);
  border-radius:12px; padding:5px 12px; font-size:13px; display:flex; align-items:center; gap:6px;
}
.hud .chip .lab{font-size:9px; color:var(--muted); letter-spacing:.5px}
.hud .chip .num{font-family:'Bangers',cursive; font-size:17px; letter-spacing:1px}
.chip.score .num{color:var(--green-l)}
.chip.best .num{color:var(--gold)}
.chip.total .num{color:var(--cyan)}

/* CANVAS */
.board-wrap{width:100%; display:flex; justify-content:center; flex:1; align-items:center}
canvas#game{
  width:100%; max-width:480px;
  border:3px solid var(--purple-d); border-radius:16px;
  box-shadow:0 0 30px rgba(120,40,200,0.4);
  background:#1d0a3d; display:block; touch-action:none;
}

/* GAME BONUS BAR */
.bonus-bar{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; width:100%; max-width:480px; margin:10px auto 0}
.bonus-btn{
  background:rgba(124,58,237,0.3); border:1.5px solid rgba(168,85,247,0.4);
  border-radius:12px; padding:8px 14px; font-family:'Fredoka One',cursive; font-size:12px;
  color:#fff; cursor:pointer; touch-action:manipulation; transition:transform .1s;
}
.bonus-btn:active{transform:scale(0.93)}
.bonus-btn.used{opacity:.3; pointer-events:none}

/* OVERLAYS / MODAL */
.overlay{
  position:fixed; inset:0; z-index:50; display:none;
  align-items:center; justify-content:center; padding:24px;
  background:rgba(5,2,15,0.82); backdrop-filter:blur(6px);
}
.overlay.show{display:flex; animation:fadein .25s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal{
  width:100%; max-width:340px; text-align:center;
  background:linear-gradient(145deg,rgba(13,5,32,0.98),rgba(30,10,65,0.98));
  border:2px solid rgba(180,100,255,0.4); border-radius:24px; padding:26px 22px;
  box-shadow:0 0 60px rgba(120,40,200,0.5); animation:pop .3s cubic-bezier(.2,1.4,.5,1)
}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal img{width:120px; height:120px; object-fit:contain; margin-bottom:10px; filter:drop-shadow(0 6px 16px rgba(0,0,0,0.6))}
.modal h2{font-family:'Bangers',cursive; font-size:30px; letter-spacing:2px; margin-bottom:8px}
.modal h2.win{color:var(--green-l); text-shadow:0 0 20px rgba(163,230,53,0.5)}
.modal h2.lose{color:#fca5a5; text-shadow:0 0 20px rgba(239,68,68,0.4)}
.modal h2.locked{color:var(--orange-l)}
.modal p{font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:18px}
.modal p b{color:var(--gold)}
.modal .modal-score{font-family:'Bangers',cursive; font-size:26px; color:var(--green-l); margin:6px 0 14px; letter-spacing:1px}
.modal .mbtn{
  width:100%; padding:14px; border:none; border-radius:14px; margin-bottom:10px;
  font-family:'Bangers',cursive; font-size:18px; letter-spacing:1px; color:#fff;
  cursor:pointer; touch-action:manipulation; transition:transform .1s;
}
.modal .mbtn:active{transform:scale(0.96)}

/* TOAST */
.toast{
  position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
  background:rgba(124,58,237,0.95); color:#fff; padding:12px 18px; border-radius:14px;
  font-size:13px; z-index:70; opacity:0; transition:opacity .25s,transform .25s; max-width:90%;
  text-align:center; box-shadow:0 6px 24px rgba(0,0,0,0.5); pointer-events:none; font-family:'Fredoka One',cursive;
}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
</style>
</head>

  fr:['Prairie','Prairie Rapide','Prairie Expert','Premier Mur','Bloc Central','Double Danger','Couloirs','Labyrinthe','Chaos','Tempête','Roi du Poulailler','Mode Infini'],
  en:['Prairie','Fast Prairie','Expert Prairie','First Wall','Center Block','Double Danger','Corridors','Labyrinth','Chaos','Storm','Henhouse King','Infinite Mode']
};

/* ---------- Holder state (same logic as Sudoku) ---------- */
let isHolder = JSON.parse(localStorage.getItem('flc_holder') || 'false');
let francBalance = Number(localStorage.getItem('flc_balance') || 0);
let unlockReason = localStorage.getItem('flc_reason') || null;
let walletLinked = JSON.parse(localStorage.getItem('flc_walletLinked') || 'false');

async function detectHolder(){
  if(tg?.initData){
    try{
      const res=await fetch(BACKEND+'/check-franc',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({initData:tg.initData})
      });
      const d=await res.json();
      walletLinked = !!(d && d.walletLinked);
      isHolder = !!(d && (d.unlocked ?? (d.walletLinked && d.hasFranc)));
      unlockReason = (d && d.reason) || (isHolder ? 'solana' : null);
      francBalance = isHolder ? Number(d.balance || 0) : 0;
      localStorage.setItem('flc_holder',JSON.stringify(isHolder));
      localStorage.setItem('flc_balance',String(francBalance));
      localStorage.setItem('flc_walletLinked',JSON.stringify(walletLinked));
      localStorage.setItem('flc_reason', unlockReason || '');
    }catch(e){/* keep cached */}
  }
  renderWalletStatus(); renderStatusBar(); renderLevelList();
}

function lockSvg(open){
  if(open){
    return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M7 10V7a5 5 0 0 1 9.6-2" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <rect x="4" y="10" width="14" height="10" rx="2.5" fill="#fff"/>
      <circle cx="11" cy="14.5" r="1.6" fill="#15803d"/>
      <rect x="10.2" y="14.5" width="1.6" height="3.2" rx="0.8" fill="#15803d"/></svg>`;
  }
  return `<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M7.5 10V7a4.5 4.5 0 0 1 9 0v3" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    <rect x="4.5" y="10" width="15" height="10" rx="2.5" fill="#fff"/>
    <circle cx="12" cy="14.5" r="1.6" fill="#b45309"/>
    <rect x="11.2" y="14.5" width="1.6" height="3.2" rx="0.8" fill="#b45309"/></svg>`;
}

function renderWalletStatus(){
  const sub=document.getElementById('walletSub');
  const lock=document.getElementById('walletLock');
  const btn=document.getElementById('btnWallet');
  if(!sub||!lock||!btn)return;
  btn.classList.remove('btn-wallet','btn-comp-green','btn-comp-orange');
  if(isHolder){
    lock.innerHTML=lockSvg(true);
    btn.classList.add('btn-comp-green');
    sub.className='wallet-sub ok';
    if(unlockReason==='stars'){ sub.textContent='Unlocked via ⭐'; }
    else { const sym=unlockReason==='ton'?'💎':'◎'; const bal=francBalance?Number(francBalance).toLocaleString():'?'; sub.textContent=`${t('wConnected')} ${sym} · ${bal} $FRANC`; }
  } else if(walletLinked){
    sub.className='wallet-sub warn'; sub.textContent=t('wNoFranc');
    lock.innerHTML=lockSvg(false); btn.classList.add('btn-comp-orange');
  } else {
    sub.className='wallet-sub warn'; sub.textContent=t('wNotConnected');
    lock.innerHTML=lockSvg(false); btn.classList.add('btn-comp-orange');
  }
}
function renderStatusBar(){
  const bar=document.getElementById('statusBar');
  if(isHolder){ bar.className='status-bar franc'; bar.innerHTML=t('statusFranc'); }

}

/* ---------- Scores: best per level ---------- */
let bestByLevel = JSON.parse(localStorage.getItem('flc_snakeBest') || '{}');
function getCumul(){ return Object.values(bestByLevel).reduce((a,b)=>a+(+b),0); }
function saveBest(lvl,s){ if(s>(bestByLevel[lvl]||0)){ bestByLevel[lvl]=s; localStorage.setItem('flc_snakeBest',JSON.stringify(bestByLevel)); return true;} return false; }
function canPlay(l){ return !l.holderOnly || isHolder; }

/* ============================================================
   GAME ENGINE — smooth continuous movement (Google Snake style)
   ============================================================ */
const COLS=14, ROWS=10, CELL=48;
const W=COLS*CELL, H=ROWS*CELL;
const cv=document.getElementById('game');
cv.width=W; cv.height=H;
const ctx=cv.getContext('2d');

let lvlId=1, score=0;
let dir={x:1,y:0}, ndir={x:1,y:0};
let running=false, rafId=null;
let tickDur=160, pixelSpeed=CELL/160;
let bDouble=false, bInv=false;
let bStock={slow:0,inv:0,x2:0,rmO:0,turbo:0};
let bgCache=null, foods=[], obstacles=[];

/* path-history movement (the key to smooth gliding) */
const WAGON_GAP = CELL;        // each wagon trails by exactly 1 cell
let path=[];                   // pixel history, newest first
let hpx=0,hpy=0,hdx=0,hdy=0;   // head pixel + velocity
let headGx=4,headGy=5,distSinceGrid=0;
let segGrids=[];               // grid coords for collision
let lastNow=0;

function lcfg(){ return LEVELS.find(l=>l.id===lvlId); }

/* Sprite images for chicks - drawn as little roosters */
const RB=['#ff5555','#ff9933','#ffdd22','#44dd66','#44aaff','#cc66ff'];

function onStartGame(){ startLevel(1); }

function startLevel(id){
  const lv=LEVELS.find(l=>l.id===id);
  if(!canPlay(lv)){ showLockModal(); return; }
  closeModal();
  lvlId=id; score=0; bDouble=false; bInv=false;
  const cumul=getCumul();
  bStock={slow:cumul>=200?1:0,inv:cumul>=400?1:0,turbo:cumul>=600?1:0,x2:cumul>=800?1:0,rmO:cumul>=1000?1:0};
  const c=lcfg(); tickDur=c.spd; pixelSpeed=CELL/tickDur;
  dir={x:1,y:0}; ndir={x:1,y:0}; hdx=pixelSpeed; hdy=0;
  headGx=4; headGy=Math.floor(ROWS/2);
  segGrids=[]; for(let i=0;i<3;i++) segGrids.push({gx:headGx-i,gy:headGy});
  distSinceGrid=0;
  hpx=headGx*CELL+CELL/2; hpy=headGy*CELL+CELL/2;
  path=[]; const seed=segGrids.length*WAGON_GAP+CELL*2;
  for(let i=0;i<seed;i++) path.push({x:hpx-i,y:hpy});
  obstacles=c.obs.map(o=>({gx:o[0],gy:o[1]}));
  foods=[]; spawnFood(); spawnFood(); spawnSpecial();
  buildBg();
  renderHUD(); renderBonus();
  document.getElementById('gameLvl').textContent = t('worlds')[c.world]+' · '+c.id+'. '+LEVEL_NAMES[lang][c.id-1];
  show('screenGame');
  // fit canvas display size to viewport
  fitCanvas();
  running=true; lastNow=performance.now();
  rafId=requestAnimationFrame(rafLoop);
}

function fitCanvas(){
  // keep aspect ratio, fill width up to 480, height bounded by viewport
  const maxW=Math.min(window.innerWidth-20,480);
  cv.style.width=maxW+'px';
  cv.style.height=(maxW*H/W)+'px';
}
window.addEventListener('resize',()=>{ if(running)fitCanvas(); });

function stopGame(){ running=false; cancelAnimationFrame(rafId); }
function quitGame(){ stopGame(); show('screenMenu'); }

function renderHUD(){
  const hud=document.getElementById('hud');
  hud.innerHTML=`
    <div class="chip score"><span class="lab">${t('score')}</span><span class="num" id="hudScore">${score}</span></div>
    <div class="chip best"><span class="lab">${t('best')}</span><span class="num" id="hudBest">${bestByLevel[lvlId]||0}</span></div>
    <div class="chip total"><span class="lab">${t('totalLbl')}</span><span class="num" id="hudTotal">${getCumul()}</span></div>`;
}
function updHUD(){
  document.getElementById('hudScore').textContent=score;
  document.getElementById('hudBest').textContent=bestByLevel[lvlId]||0;
  document.getElementById('hudTotal').textContent=getCumul();
}

function renderBonus(){
  const bar=document.getElementById('bonusBar'); bar.innerHTML='';
  const cumul=getCumul();
  [{k:'slow',l:t('bonusSlow'),r:200},{k:'inv',l:t('bonusInv'),r:400},{k:'turbo',l:t('bonusTurbo'),r:600},{k:'x2',l:t('bonusX2'),r:800},{k:'rmO',l:t('bonusRm'),r:1000}].forEach(d=>{
    if(cumul<d.r)return;
    const b=document.createElement('button');
    b.className='bonus-btn'+(bStock[d.k]<=0?' used':'');
    b.textContent=d.l+(bStock[d.k]<=0?' ✓':'');
    b.onclick=()=>useBonus(d.k,b);
    bar.appendChild(b);
  });
}
function useBonus(k,btn){
  if(bStock[k]<=0)return;
  bStock[k]=0; btn.classList.add('used'); btn.textContent+=' ✓';
  let spd=lcfg().spd;
  if(k==='slow'){spd=Math.min(spd*1.8,360);pixelSpeed=CELL/spd;toast(t('bonusSlow'));}
  if(k==='turbo'){spd=Math.max(spd*.5,50);pixelSpeed=CELL/spd;toast(t('bonusTurbo'));}
  if(k==='inv'){bInv=true;toast(t('bonusInv'));setTimeout(()=>{bInv=false;},8000);}
  if(k==='x2'){bDouble=true;toast(t('bonusX2'));setTimeout(()=>bDouble=false,60000);}
  if(k==='rmO'&&obstacles.length){obstacles.splice((Math.random()*obstacles.length)|0,1);buildBg();toast(t('bonusRm'));}
}

/* ---------- Food ---------- */
function spawnFood(type){
  type=type||'n';
  for(let i=0;i<200;i++){
    const gx=(Math.random()*COLS)|0, gy=(Math.random()*ROWS)|0;
    if(!segGrids.find(s=>s.gx===gx&&s.gy===gy)&&!obstacles.find(o=>o.gx===gx&&o.gy===gy)&&!foods.find(f=>f.gx===gx&&f.gy===gy)){
      foods.push({gx,gy,t:type,ph:Math.random()*6.28}); return;
    }
  }
}
function spawnSpecial(){
  if(Math.random()<.22)spawnFood(Math.random()<.5?'r':'v');
  if(Math.random()<.09)spawnFood('g');
}

/* ---------- Grid crossing ---------- */
function onGridCross(){
  const c=lcfg();
  if(ndir.x!==-dir.x||ndir.y!==-dir.y){ dir={...ndir}; hdx=dir.x*pixelSpeed; hdy=dir.y*pixelSpeed; }
  let nx=headGx+dir.x, ny=headGy+dir.y, didWrap=false;
  if(c.wrap){ const wx=((nx%COLS)+COLS)%COLS, wy=((ny%ROWS)+ROWS)%ROWS; if(wx!==nx||wy!==ny)didWrap=true; nx=wx; ny=wy; }
  if(c.walls&&(nx<0||nx>=COLS||ny<0||ny>=ROWS)){ gameOver(); return; }
  const fi=foods.findIndex(f=>f.gx===nx&&f.gy===ny);
  const ate=fi>=0;
  if(!bInv){
    const chk=ate?segGrids.slice(1):segGrids.slice(1,segGrids.length-1);
    if(chk.find(s=>s.gx===nx&&s.gy===ny)){ gameOver(); return; }
    if(obstacles.find(o=>o.gx===nx&&o.gy===ny)){ gameOver(); return; }
  }
  headGx=nx; headGy=ny;
  if(didWrap){
    hpx=nx*CELL+CELL/2; hpy=ny*CELL+CELL/2;
    path=[]; const seed=segGrids.length*WAGON_GAP+CELL*2;
    for(let i=0;i<seed;i++) path.push({x:hpx-i*dir.x,y:hpy-i*dir.y});
  }
  if(!ate)segGrids.pop();
  segGrids.unshift({gx:nx,gy:ny});
  if(ate){
    const f=foods.splice(fi,1)[0];
    let pts=f.t==='g'?10:f.t==='v'?5:f.t==='r'?3:1;
    if(bDouble)pts*=2;
    score+=pts;
    if(saveBest(lvlId,score)){ /* record */ }
    spawnFood(Math.random()<.08?'r':Math.random()<.05?'g':Math.random()<.07?'v':'n');
    if(foods.length<2)spawnFood();
    updHUD();
  }
  if(c.infinite&&score>0&&score%40===0){
    const ax=(Math.random()*COLS)|0, ay=(Math.random()*ROWS)|0;
    if(!segGrids.find(s=>s.gx===ax&&s.gy===ay)) obstacles.push({gx:ax,gy:ay});
    buildBg();
  }
}

function gameOver(){
  stopGame();
  const isRecord = score>0 && score>=(bestByLevel[lvlId]||0);
  const m=document.getElementById('modal');
  m.innerHTML=`<img src="${IMG.triste}" alt="">
    <h2 class="lose">${t('gameOver')}</h2>
    <p>${t('goText')}</p>
    <div class="modal-score">🐥 ${score}</div>
    ${isRecord&&score>0?`<p style="color:var(--green-l);margin-bottom:14px">${t('newRecord')}</p>`:''}
    <button class="mbtn btn-comp-green" onclick="closeModal();startLevel(${lvlId})">${t('replay')}</button>
    <button class="mbtn btn-purple" onclick="closeModal();show('screenLevels')">${t('toLevels')}</button>
    <button class="mbtn btn-wallet" onclick="closeModal();show('screenMenu')">${t('toMenu')}</button>`;
  document.getElementById('overlay').classList.add('show');
}

/* ---------- RAF loop ---------- */
function rafLoop(now){
  if(!running)return;
  const dt=Math.min(now-lastNow,40); lastNow=now;
  hpx+=hdx*dt; hpy+=hdy*dt; distSinceGrid+=pixelSpeed*dt;
  if(distSinceGrid>=CELL){ distSinceGrid-=CELL; onGridCross(); if(!running)return; }
  path.unshift({x:hpx,y:hpy});
  const need=segGrids.length*WAGON_GAP+CELL*3;
  if(path.length>need)path.length=need;
  drawFrame(now);
  rafId=requestAnimationFrame(rafLoop);
}

function segPos(i){ const idx=Math.min(Math.round(i*WAGON_GAP),path.length-1); return path[idx]||{x:hpx,y:hpy}; }
function segDir(idx){ const a=path[Math.max(0,idx-2)]||path[0]; const b=path[Math.min(idx+2,path.length-1)]||path[path.length-1]; return{dx:b.x-a.x,dy:b.y-a.y}; }

/* ---------- Background ---------- */
function buildBg(){
  bgCache=document.createElement('canvas'); bgCache.width=W; bgCache.height=H;
  const bx=bgCache.getContext('2d');
  for(let x=0;x<COLS;x++)for(let y=0;y<ROWS;y++){
    bx.fillStyle=(x+y)%2===0?'#a3d948':'#97cf3c';
    bx.fillRect(x*CELL,y*CELL,CELL,CELL);
  }
  const c=lcfg();
  if(c.walls){
    for(let i=0;i<COLS;i++){wall(bx,i,0);wall(bx,i,ROWS-1);}
    for(let i=1;i<ROWS-1;i++){wall(bx,0,i);wall(bx,COLS-1,i);}
  }
  obstacles.forEach(o=>hay(bx,o.gx,o.gy));
}
function wall(bx,gx,gy){
  const x=gx*CELL,y=gy*CELL;
  bx.fillStyle='#52732c';bx.fillRect(x,y,CELL,CELL);
  bx.fillStyle='#62812f';bx.fillRect(x+1,y+1,CELL-2,CELL-2);
  bx.strokeStyle='rgba(0,0,0,.2)';bx.lineWidth=1;
  bx.beginPath();bx.moveTo(x,y+CELL/2);bx.lineTo(x+CELL,y+CELL/2);bx.stroke();
  bx.beginPath();bx.moveTo(x+CELL/2,y);bx.lineTo(x+CELL/2,y+CELL/2);bx.stroke();
  bx.fillStyle='rgba(255,255,255,.06)';bx.fillRect(x+1,y+1,CELL-2,2);
}
function hay(bx,gx,gy){
  const x=gx*CELL+4,y=gy*CELL+4,s=CELL-8;
  bx.fillStyle='rgba(0,0,0,.18)';bx.fillRect(x+2,y+2,s,s);
  bx.fillStyle='#c88020';rrp(bx,x,y,s,s,8);bx.fill();
  bx.fillStyle='#e0a030';rrp(bx,x+1,y+1,s-2,s*.45,6);bx.fill();
  bx.strokeStyle='#9a6010';bx.lineWidth=1;
  for(let i=0;i<3;i++){bx.beginPath();bx.moveTo(x+4,y+5+i*6);bx.lineTo(x+s-4,y+5+i*6);bx.stroke();}
  bx.strokeStyle='rgba(0,0,0,.28)';bx.lineWidth=1.2;rrp(bx,x,y,s,s,8);bx.stroke();
}
function rrp(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();}

/* ---------- Draw frame ---------- */
function drawFrame(now){
  ctx.clearRect(0,0,W,H);
  if(bgCache)ctx.drawImage(bgCache,0,0);
  foods.forEach(f=>drawFood(f,now));
  for(let i=segGrids.length-1;i>=1;i--)drawWagon(i,now);
  drawTractor(now);
}

/* ---------- Food (loose red trailer + chick) ---------- */
function drawFood(f,now){
  const bob=Math.sin(now*.003+f.ph)*2;
  let body,rim;
  if(f.t==='g'){body='#f5c010';rim='#b08000';}
  else if(f.t==='v'){body='#8040d0';rim='#5020a0';}
  else if(f.t==='r'){body=RB[(now/90|0)%6];rim='#666';}
  else{body='#d92f2f';rim='#a91c1c';}
  ctx.save();ctx.translate(f.gx*CELL+CELL/2,f.gy*CELL+CELL/2+bob);
  ctx.globalAlpha=.16;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(0,CELL*.4,CELL*.34,CELL*.09,0,0,6.28);ctx.fill();ctx.globalAlpha=1;
  trailerBody(body,rim);
  chickTop(CELL*.2,f.t,now,f.ph);
  if(f.t==='r'){ctx.strokeStyle=RB[(now/80|0)%6];ctx.lineWidth=2;ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(0,0,CELL*.55,0,6.28);ctx.stroke();ctx.globalAlpha=1;}
  if(f.t==='g'){ctx.fillStyle='#ffe060';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.fillText('★',0,-CELL*.42);}
  if(f.t==='v'){ctx.fillStyle='#e0aaff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.fillText('VIP',0,-CELL*.44);}
  ctx.restore();
}

/* ---------- Wagon ---------- */
function drawWagon(i,now){
  const p=segPos(i);
  const pidx=Math.min(Math.round(i*WAGON_GAP),path.length-1);
  const pd=segDir(pidx);
  const ang=Math.atan2(pd.dy,pd.dx)+Math.PI/2;
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(ang);
  const body=bDouble?'#d09010':'#d92f2f', rim=bDouble?'#a06800':'#a91c1c';
  trailerBody(body,rim);
  ctx.rotate(-ang);  // un-rotate so chick faces camera
  chickTop(CELL*.17,'n',now,i*1.3);
  ctx.restore();
}

/* Top-down red trailer, fills one cell */
function trailerBody(body,rim){
  const w=CELL*.74,h=CELL*.86,hw=w/2,hh=h/2;
  ctx.fillStyle='rgba(0,0,0,.2)';rrp(ctx,-hw+2,-hh+2,w,h,9);ctx.fill();
  const g=ctx.createLinearGradient(-hw,0,hw,0);
  g.addColorStop(0,rim);g.addColorStop(.5,body);g.addColorStop(1,rim);
  ctx.fillStyle=g;rrp(ctx,-hw,-hh,w,h,9);ctx.fill();
  // cargo recess
  ctx.fillStyle='rgba(0,0,0,.22)';rrp(ctx,-hw*.7,-hh*.6,w*.7,h*.6,6);ctx.fill();
  ctx.strokeStyle=rim;ctx.lineWidth=2;rrp(ctx,-hw,-hh,w,h,9);ctx.stroke();
  // wheels on sides
  topWheel(-hw-2,-h*.22);topWheel(hw+2,-h*.22);
  topWheel(-hw-2, h*.22);topWheel(hw+2, h*.22);
}
function topWheel(x,y){
  const rw=CELL*.07,rh=CELL*.15;
  ctx.fillStyle='#111';rrp(ctx,x-rw,y-rh,rw*2,rh*2,3);ctx.fill();
  ctx.fillStyle='#333';rrp(ctx,x-rw*.5,y-rh*.6,rw,rh*1.2,2);ctx.fill();
}

/* Chick seen from top — cute yellow with beak + eyes */
function chickTop(r,type,now,ph){
  const col=type==='g'?'#f5d020':type==='v'?'#b080f0':type==='r'?RB[(now/120|0)%6]:'#ffe040';
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(0,0,r,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.beginPath();ctx.arc(-r*.22,-r*.22,r*.42,0,6.28);ctx.fill();
  // little wing tufts
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.beginPath();ctx.ellipse(-r*.7,0,r*.25,r*.5,0,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(r*.7,0,r*.25,r*.5,0,0,6.28);ctx.fill();
  // beak (points up)
  ctx.fillStyle='#ff9b20';ctx.beginPath();ctx.moveTo(-r*.22,-r*.78);ctx.lineTo(0,-r*1.2);ctx.lineTo(r*.22,-r*.78);ctx.closePath();ctx.fill();
  // eyes
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(-r*.3,-r*.12,r*.15,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(r*.3,-r*.12,r*.15,0,6.28);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-r*.26,-r*.16,r*.06,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(r*.34,-r*.16,r*.06,0,6.28);ctx.fill();
}

/* ---------- Tractor (top-down red, Francis driving) ---------- */
function drawTractor(now){
  const p=segPos(0);
  const ang=Math.atan2(hdy,hdx)+Math.PI/2;
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(ang);
  const t2=now*.001;
  // shadow
  ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(0,0,CELL*.5,CELL*.5,0,0,6.28);ctx.fill();
  // big rear wheels
  bigWheel(-CELL*.42,CELL*.14,now);bigWheel(CELL*.42,CELL*.14,now);
  bigWheel(-CELL*.42,-CELL*.14,now);bigWheel(CELL*.42,-CELL*.14,now);
  // body
  const bw=CELL*.62,bh=CELL*.84,hw=bw/2,hh=bh/2;
  ctx.fillStyle='rgba(0,0,0,.2)';rrp(ctx,-hw+2,-hh+2,bw,bh,10);ctx.fill();
  const g=ctx.createLinearGradient(-hw,0,hw,0);
  g.addColorStop(0,'#a91c1c');g.addColorStop(.5,'#ef4444');g.addColorStop(1,'#a91c1c');
  ctx.fillStyle=g;rrp(ctx,-hw,-hh,bw,bh,10);ctx.fill();
  ctx.strokeStyle='#881010';ctx.lineWidth=2;rrp(ctx,-hw,-hh,bw,bh,10);ctx.stroke();
  // hood (front)
  ctx.fillStyle='#c52020';rrp(ctx,-bw*.32,-hh,bw*.64,bh*.3,7);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.25)';for(let i=0;i<3;i++)ctx.fillRect(-bw*.2,-hh+6+i*4,bw*.4,2);
  // small front wheels
  smWheel(-CELL*.3,-hh+3);smWheel(CELL*.3,-hh+3);
  // exhaust
  ctx.fillStyle='#333';ctx.fillRect(-CELL*.2,-hh-1,4,7);
  ctx.fillStyle=`rgba(200,200,200,${.1+.07*Math.sin(t2*14)})`;ctx.beginPath();ctx.arc(-CELL*.18,-hh-2,3,0,6.28);ctx.fill();
  // Francis the rooster top-down
  drawFrancisTop(now);
  ctx.restore();
}
function drawFrancisTop(now){
  const t2=now*.001;
  // body (red)
  ctx.fillStyle='#c03020';ctx.beginPath();ctx.ellipse(0,-CELL*.04,CELL*.19,CELL*.24,0,0,6.28);ctx.fill();
  // wings spread
  const wa=Math.sin(t2*3)*0.1;
  for(const side of [-1,1]){
    ctx.save();ctx.rotate(wa*side);
    ctx.fillStyle='#a82818';
    ctx.beginPath();
    ctx.moveTo(0,-CELL*.05);
    ctx.bezierCurveTo(side*CELL*.16,-CELL*.1,side*CELL*.34,-CELL*.02,side*CELL*.3,CELL*.12);
    ctx.bezierCurveTo(side*CELL*.24,CELL*.2,side*CELL*.08,CELL*.12,0,CELL*.08);
    ctx.closePath();ctx.fill();
    ctx.restore();
  }
  // head
  ctx.fillStyle='#c03020';ctx.beginPath();ctx.arc(0,-CELL*.28,CELL*.13,0,6.28);ctx.fill();
  // comb
  ctx.fillStyle='#ff3030';
  ctx.beginPath();ctx.arc(-CELL*.04,-CELL*.37,CELL*.05,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(CELL*.02,-CELL*.4,CELL*.06,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(CELL*.07,-CELL*.35,CELL*.045,0,6.28);ctx.fill();
  // beak
  ctx.fillStyle='#e8a020';ctx.beginPath();ctx.moveTo(-CELL*.04,-CELL*.4);ctx.lineTo(0,-CELL*.48);ctx.lineTo(CELL*.04,-CELL*.4);ctx.closePath();ctx.fill();
  // eyes
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(-CELL*.07,-CELL*.28,CELL*.045,0,6.28);ctx.fill();
  ctx.beginPath();ctx.arc(CELL*.07,-CELL*.28,CELL*.045,0,6.28);ctx.fill();
  if(bInv){ctx.strokeStyle='rgba(190,80,255,.5)';ctx.lineWidth=3;ctx.beginPath();ctx.arc(0,-CELL*.05,CELL*.5,0,6.28);ctx.stroke();}
}
function bigWheel(x,y,now){
  const rw=CELL*.12,rh=CELL*.2;
  ctx.fillStyle='#111';rrp(ctx,x-rw,y-rh,rw*2,rh*2,4);ctx.fill();
  ctx.fillStyle='#2a2a2a';rrp(ctx,x-rw*.6,y-rh*.7,rw*1.2,rh*1.4,3);ctx.fill();
  ctx.strokeStyle='#0a0a0a';ctx.lineWidth=1.5;
  for(let i=0;i<5;i++){const oy=-rh*.7+i*rh*.35;ctx.beginPath();ctx.moveTo(x-rw*.55,y+oy);ctx.lineTo(x+rw*.55,y+oy);ctx.stroke();}
  ctx.fillStyle='#666';ctx.beginPath();ctx.arc(x,y,rw*.32,0,6.28);ctx.fill();
}
function smWheel(x,y){
  const rw=CELL*.09,rh=CELL*.13;
  ctx.fillStyle='#1a1a1a';rrp(ctx,x-rw,y,rw*2,rh,3);ctx.fill();
}

/* ---------- Controls ---------- */
const KM={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
document.addEventListener('keydown',e=>{
  if(KM[e.key]){const d=KM[e.key];if(d.x!==-dir.x||d.y!==-dir.y)ndir=d;e.preventDefault();}
});
let ts=null;
cv.addEventListener('touchstart',e=>{const tt=e.touches[0];ts={x:tt.clientX,y:tt.clientY};e.preventDefault();},{passive:false});
cv.addEventListener('touchend',e=>{
  if(!ts)return;
  const tt=e.changedTouches[0],dx=tt.clientX-ts.x,dy=tt.clientY-ts.y;
  if(Math.max(Math.abs(dx),Math.abs(dy))<8){ts=null;return;}
  if(Math.abs(dx)>Math.abs(dy)){const d=dx>0?{x:1,y:0}:{x:-1,y:0};if(d.x!==-dir.x)ndir=d;}
  else{const d=dy>0?{x:0,y:1}:{x:0,y:-1};if(d.y!==-dir.y)ndir=d;}
  ts=null;e.preventDefault();
},{passive:false});

/* ---------- Init ---------- */
function init(){
  if(tg){try{tg.ready();tg.expand();}catch(e){}}
  setLang(lang);
  renderWalletStatus(); renderStatusBar(); renderLevelList();
  detectHolder();
}
init();

</script>
